plugins {
    id "com.android.application"
}

android {
    namespace "org.roman.flutter_hello"
    compileSdk 34

    defaultConfig {
        applicationId "org.roman.flutter_hello"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "0.1"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation "androidx.core:core:1.12.0"
}
